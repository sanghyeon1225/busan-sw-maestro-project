name: 이슈 라벨 자동 부여

on:
  issues:
    types: [opened]

jobs:
  add-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 이슈 본문에서 팀 번호 및 코치 이름 추출 후 라벨 부여
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const labelsToAdd = [];

            // 팀 번호 추출 (team{번호} 패턴)
            const teamMatch = body.match(/team(\d+)/i);
            if (teamMatch) {
              const teamLabel = `Team ${teamMatch[1]}`;
              labelsToAdd.push({ name: teamLabel, color: '1D76DB', description: `팀 ${teamMatch[1]}` });
            }

            // 코치별 고유 색상 매핑
            const coachColorMap = {
              '강천성 코치': 'D93F0B', // 주황
              '고지형 코치': 'C2185B', // 분홍
              '권용훈 코치': '0D47A1', // 남색
              '박현병 코치': '00897B', // 청록
              '윤형근 코치': '8D6E63', // 갈색
              '이동빈 코치': 'F57C00', // 오렌지
              '이원빈 코치': '5C6BC0', // 인디고
              '이유진 코치': '6F42C1', // 보라
              '전상민 코치': 'E4E669', // 노랑
              '최성욱 코치': '43A047', // 연두
              '최홍준 코치': 'B60205', // 빨강
              '황태백 코치': '006B75', // 틸
              '최선웅 코치': 'FCA326', // 황금
              '공정필 코치': '1AA8E8', // 하늘
              '최윤주 코치': 'D876E3', // 라벤더
            };

            // 코치 이름 추출 ("### 코치" 섹션 아래 텍스트)
            const coachMatch = body.match(/###\s*코치\s*\n\s*(.+)/);
            if (coachMatch) {
              const coachName = coachMatch[1].trim();
              if (coachName) {
                const color = coachColorMap[coachName] || 'BFDADC';
                labelsToAdd.push({ name: coachName, color, description: `${coachName} 피드백` });
              }
            }

            if (labelsToAdd.length === 0) {
              console.log('추출할 라벨이 없습니다.');
              return;
            }

            // 라벨별로 개별 처리 (하나가 실패해도 나머지는 계속 진행)
            for (const label of labelsToAdd) {
              try {
                // 라벨 존재 여부 확인
                try {
                  await github.rest.issues.getLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                  });
                  console.log(`라벨 "${label.name}" 이미 존재합니다.`);
                } catch (e) {
                  if (e.status === 404) {
                    await github.rest.issues.createLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: label.name,
                      color: label.color,
                      description: label.description,
                    });
                    console.log(`라벨 "${label.name}" 생성 완료.`);
                  }
                }

                // 이슈에 라벨 추가
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: [label.name],
                });
                console.log(`라벨 "${label.name}" 부여 완료.`);
              } catch (e) {
                console.log(`라벨 "${label.name}" 처리 실패: ${e.message}`);
              }
            }
